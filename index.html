<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Feedback & Complaint Portal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root {
            --primary-blue: #0ea5e9;
            --dark-navy: #0f172a;
            --bg-dark-blue: #1e293b;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
            --border-radius: 12px;
        }

        body {
            background-color: var(--dark-navy); 
            background-image: radial-gradient(circle at top left, #1e293b 0%, #0f172a 100%);
            color: var(--dark-navy);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .form-container {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3); /* Slightly deeper shadow for dark mode */
            width: 100%;
            max-width: 450px;
            text-align: left;
        }

        .header-section {
            text-align: center;
            margin-bottom: 2rem;
        }

        /* LOGO STYLING */
        .school-logo {
            width: 100px; /* Adjust this size if your logo is too big/small */
            height: auto;
            margin: 0 auto 1rem auto;
            display: block;
        }

        .header-section h2 {
            margin: 0;
            color: var(--dark-navy);
            font-size: 1.5rem;
        }

        .header-section p {
            color: #64748b;
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 2px solid var(--border-color);
            border-radius: var(--border-radius);
            box-sizing: border-box;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-blue);
        }

        button {
            background-color: var(--primary-blue);
            color: white;
            padding: 14px 20px;
            border: none;
            border-radius: var(--border-radius);
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            font-weight: 600;
            transition: transform 0.1s, opacity 0.2s;
            box-shadow: 0 4px 6px -1px rgba(14, 165, 233, 0.2);
        }

        button:hover { opacity: 0.9; }
        button:active { transform: scale(0.98); }

        .qr-section {
            margin-top: 30px;
            text-align: center;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }

        #qrcode {
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="form-container">
    <div class="header-section">
        <img src="logo.png" alt="School Logo" class="school-logo">
        <h2>Submit Your Concern</h2>
        <p>Help us improve our school experience.</p>
    </div>
    
    <label for="userName">Full Name (Optional)</label>
    <input type="text" id="userName" placeholder="Enter your name or leave blank for anonymous">

    <label for="role">Your Role</label>
    <select id="role">
        <option value="Student">Student</option>
        <option value="Teacher">Teacher</option>
        <option value="Parent">Parent</option>
    </select>

    <label for="message">Your Complaint/Suggestion</label>
    <textarea id="message" rows="4" placeholder="How can we help you?"></textarea>

    <button id="submitBtn" onclick="submitComplaint()">Submit Securely</button>

    <div class="qr-section">
        <p style="font-size: 0.8rem; color: #64748b;">Scan to open this form on your phone</p>
        <div id="qrcode"></div>
    </div>
</div>

<script>
// Generate QR Code
new QRCode(document.getElementById("qrcode"), {
    text: "https://sekolah-9393-png.github.io/SMKSFC-Public-Feedback/", 
    width: 100,
    height: 100
});

async function submitComplaint() {
    const name = document.getElementById('userName').value || "Anonymous";
    const role = document.getElementById('role').value;
    const msg = document.getElementById('message').value;
    const btn = document.getElementById('submitBtn');
    
    const webAppUrl = "https://script.google.com/macros/s/AKfycbwjF9TzXegrh7Ah1KDpM0ezbA5nFH57V2_MBCSSMTDfat7QT5PLch6kuagL1kWpLs4TFQ/exec";

    if(!msg) {
        alert("Please enter your complaint.");
        return;
    }

    btn.innerText = "Sending...";
    btn.disabled = true;

    const formData = new URLSearchParams();
    formData.append('name', name);
    formData.append('role', role);
    formData.append('message', msg);
    formData.append('date', new Date().toLocaleString());

    try {
        await fetch(webAppUrl, {
            method: 'POST',
            mode: 'no-cors', 
            body: formData.toString(),
            headers: { "Content-Type": "application/x-www-form-urlencoded" }
        });

        alert("Success! Your concern has been sent to the administrator.");
        document.getElementById('message').value = "";
        document.getElementById('userName').value = "";
    } catch (error) {
        alert("Error sending message. Check console for details.");
        console.error(error);
    } finally {
        btn.innerText = "Submit Securely";
        btn.disabled = false;
    }
}
</script>

</body>
</html>
