<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Feedback & Complaint Portal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
    /* 1. Import Modern Font */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

    :root {
        --primary-blue: #0ea5e9;
        --dark-navy: #0f172a;
        --bg-dark-blue: #1e293b;
        --card-bg: rgba(255, 255, 255, 0.96); /* Glass effect */
        --border-color: #e2e8f0;
        --border-radius: 16px; /* Slightly rounder for a modern look */
    }

    body {
        background-color: var(--dark-navy); 
        background-image: radial-gradient(circle at top left, #1e293b 0%, #0f172a 100%);
        color: var(--dark-navy);
        font-family: 'Inter', sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
        overflow-x: hidden;
    }

    /* 2. Entrance Animation */
    @keyframes formEntrance {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .form-container {
        background: var(--card-bg);
        backdrop-filter: blur(12px); /* Blur background behind card */
        padding: 2.5rem;
        border-radius: var(--border-radius);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        width: 100%;
        max-width: 420px;
        animation: formEntrance 0.7s cubic-bezier(0.2, 0.8, 0.2, 1);
        border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .header-section {
        text-align: center;
        margin-bottom: 2rem;
    }

    .school-logo {
        width: 90px;
        height: auto;
        margin: 0 auto 1.2rem auto;
        display: block;
        filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
    }

    .header-section h2 {
        margin: 0;
        color: var(--dark-navy);
        font-size: 1.6rem;
        font-weight: 700;
        letter-spacing: -0.02em;
    }

    .header-section p {
        color: #64748b;
        font-size: 0.95rem;
        margin-top: 0.5rem;
    }

    label {
        display: block;
        font-weight: 600;
        margin-bottom: 8px;
        font-size: 0.85rem;
        color: #475569;
        text-transform: uppercase;
        letter-spacing: 0.025em;
    }

    /* 3. Modern Input Focus Halos */
    input, select, textarea {
        width: 100%;
        padding: 14px;
        margin-bottom: 20px;
        border: 2px solid var(--border-color);
        border-radius: 12px;
        box-sizing: border-box;
        font-size: 1rem;
        font-family: inherit;
        transition: all 0.2s ease;
        background: #fcfcfd;
    }

    input:focus, select:focus, textarea:focus {
        outline: none;
        border-color: var(--primary-blue);
        background: #fff;
        box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.15);
        transform: translateY(-1px);
    }

    /* 4. Interactive Button */
    button {
        background: linear-gradient(135deg, var(--primary-blue) 0%, #0284c7 100%);
        color: white;
        padding: 16px 20px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        width: 100%;
        font-size: 1rem;
        font-weight: 600;
        transition: all 0.3s ease;
        box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
    }

    button:hover {
        opacity: 0.95;
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(14, 165, 233, 0.4);
    }

    button:active {
        transform: translateY(0);
    }

    .qr-section {
        margin-top: 30px;
        text-align: center;
        border-top: 1px solid var(--border-color);
        padding-top: 25px;
    }

    #qrcode img {
        border-radius: 8px;
        padding: 10px;
        background: white;
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }
</style>

<body>
<div class="form-container">
    <div id="form-content">
        <div class="header-section">
            <img src="logo.png" alt="School Logo" class="school-logo">
            <h2>Submit Your Concern</h2>
            <p>Your voice helps us grow.</p>
        </div>
        
        <label for="userName">Full Name (Optional)</label>
        <input type="text" id="userName" placeholder="e.g. John Doe">

        <label for="role">Your Role</label>
        <select id="role">
            <option value="Student">Student</option>
            <option value="Teacher">Teacher</option>
            <option value="Staff">Staff</option>
            <option value="Parent">Parent</option>
        </select>

        <label for="message">Message</label>
        <textarea id="message" rows="4" placeholder="Share your thoughts or concerns..."></textarea>

        <button id="submitBtn" onclick="submitComplaint()">Submit Securely</button>

        <div class="qr-section">
            <p style="font-size: 0.8rem; color: #64748b; margin-bottom: 12px;">Mobile Access</p>
            <div id="qrcode" style="display:flex; justify-content:center;"></div>
        </div>
    </div>

    <div id="success-msg" style="display: none; text-align: center; padding: 10px 0;">
        <div style="font-size: 70px; margin-bottom: 10px;">✔</div>
        <h2 style="color: var(--dark-navy); font-size: 1.8rem;">Thank You!</h2>
        <p style="color: #64748b; line-height: 1.6; margin-bottom: 30px;">Your feedback has been sent securely to the school administration. We're on it!</p>
        <button onclick="location.reload()">Send Another Response</button>
    </div>
</div>

<script>
// Generate QR Code
new QRCode(document.getElementById("qrcode"), {
    text: "https://sekolah-9393-png.github.io/SMKSFC-Public-Feedback/", 
    width: 100,
    height: 100
});

async function submitComplaint() {
    const name = document.getElementById('userName').value || "Anonymous";
    const role = document.getElementById('role').value;
    const msg = document.getElementById('message').value;
    const btn = document.getElementById('submitBtn');
    
    // Elements to toggle
    const formContent = document.getElementById('form-content');
    const successMsg = document.getElementById('success-msg');

    if(!msg) {
        alert("Please enter your complaint.");
        return;
    }

    btn.innerText = "Sending...";
    btn.disabled = true;

    const formData = new URLSearchParams();
    formData.append('name', name);
    formData.append('role', role);
    formData.append('message', msg);
    formData.append('date', new Date().toLocaleString());

    try {
        await fetch("https://script.google.com/macros/s/AKfycbwjF9TzXegrh7Ah1KDpM0ezbA5nFH57V2_MBCSSMTDfat7QT5PLch6kuagL1kWpLs4TFQ/exec", {
            method: 'POST',
            mode: 'no-cors', 
            body: formData.toString(),
            headers: { "Content-Type": "application/x-www-form-urlencoded" }
        });

        // HIDE FORM, SHOW SUCCESS
        formContent.style.display = 'none';
        successMsg.style.display = 'block';

    } catch (error) {
        alert("Error sending message. Check console for details.");
        console.error(error);
        btn.innerText = "Submit Securely";
        btn.disabled = false;
    }
}
</script>

</body>
</html>
