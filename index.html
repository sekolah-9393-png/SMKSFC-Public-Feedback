<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Feedback & Complaint Portal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { color: var(--primary); text-align: center; margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #555; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .btn-submit { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; cursor: pointer; font-size: 1rem; transition: background 0.3s; }
        .btn-submit:hover { background: var(--accent); }
        .btn-submit:disabled { background: #ccc; cursor: not-allowed; }
        
        /* QR Section Styling */
        .qr-section { margin-top: 30px; text-align: center; border-top: 1px solid #eee; padding-top: 20px; }
        #qrcode { display: flex; justify-content: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Submit Your Concern</h2>
    
    <label for="userName">Full Name (Optional)</label>
    <input type="text" id="userName" placeholder="Enter your name or leave blank for anonymous">

    <label for="role">Your Role</label>
    <select id="role">
        <option value="Student">Student</option>
        <option value="Teacher">Teacher</option>
        <option value="Parent">Parent</option>
    </select>

    <label for="message">Your Complaint/Suggestion</label>
    <textarea id="message" rows="5" placeholder="How can we help you?"></textarea>

    <button class="btn-submit" onclick="submitComplaint()">Submit Securely</button>

    <div class="qr-section">
        <p style="font-size: 0.9rem; color: #666;">Scan to open this form on your phone</p>
        <div id="qrcode"></div>
    </div>
</div>

<script>
// Replace 'your-username' and 'your-repo' with your actual GitHub info
new QRCode(document.getElementById("qrcode"), {
    text: "https://your-username.github.io/your-repo/", 
    width: 120,
    height: 120
});

async function submitComplaint() {
    const name = document.getElementById('userName').value || "Anonymous";
    const role = document.getElementById('role').value;
    const msg = document.getElementById('message').value;
    
    const webAppUrl = "https://script.google.com/macros/s/AKfycbwjF9TzXegrh7Ah1KDpM0ezbA5nFH57V2_MBCSSMTDfat7QT5PLch6kuagL1kWpLs4TFQ/exec";

    if(!msg) {
        alert("Please enter your complaint.");
        return;
    }

    const btn = document.querySelector('.btn-submit');
    btn.innerText = "Sending...";
    btn.disabled = true;

    const formData = new URLSearchParams();
    formData.append('name', name);
    formData.append('role', role);
    formData.append('message', msg);
    formData.append('date', new Date().toLocaleString());

    try {
        await fetch(webAppUrl, {
            method: 'POST',
            mode: 'no-cors', 
            body: formData.toString(),
            headers: { "Content-Type": "application/x-www-form-urlencoded" }
        });

        alert("Success! Your concern has been sent to the administrator.");
        document.getElementById('message').value = "";
        document.getElementById('userName').value = "";
    } catch (error) {
        alert("Error sending message. Check console for details.");
        console.error(error);
    } finally {
        btn.innerText = "Submit Securely";
        btn.disabled = false;
    }
}
</script>
</body>
</html>
